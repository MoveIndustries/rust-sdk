name: Release

on:
  push:
    tags:
      - 'sdk-v*.*.*'
      - 'sdk-v*.*.*-*'
      - 'macros-v*.*.*'
      - 'macros-v*.*.*-*'
  workflow_dispatch:
    inputs:
      crate:
        description: 'Which crate to publish'
        required: true
        type: choice
        options:
          - movement-sdk
          - movement-sdk-macros
          - both
      dry_run:
        description: 'Dry run (do not actually publish)'
        required: false
        default: true
        type: boolean

env:
  CARGO_TERM_COLOR: always

jobs:
  # Determine which crates to publish based on the tag or manual input
  resolve:
    name: Resolve Crates
    runs-on: ubuntu-latest
    outputs:
      publish_macros: ${{ steps.resolve.outputs.publish_macros }}
      publish_sdk: ${{ steps.resolve.outputs.publish_sdk }}
    steps:
      - name: Resolve which crates to publish
        id: resolve
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            case "${{ inputs.crate }}" in
              movement-sdk-macros)
                echo "publish_macros=true" >> "$GITHUB_OUTPUT"
                echo "publish_sdk=false" >> "$GITHUB_OUTPUT"
                ;;
              movement-sdk)
                echo "publish_macros=false" >> "$GITHUB_OUTPUT"
                echo "publish_sdk=true" >> "$GITHUB_OUTPUT"
                ;;
              both)
                echo "publish_macros=true" >> "$GITHUB_OUTPUT"
                echo "publish_sdk=true" >> "$GITHUB_OUTPUT"
                ;;
            esac
          else
            TAG="${GITHUB_REF#refs/tags/}"
            if [[ "$TAG" == macros-v* ]]; then
              echo "publish_macros=true" >> "$GITHUB_OUTPUT"
              echo "publish_sdk=false" >> "$GITHUB_OUTPUT"
            elif [[ "$TAG" == sdk-v* ]]; then
              echo "publish_macros=false" >> "$GITHUB_OUTPUT"
              echo "publish_sdk=true" >> "$GITHUB_OUTPUT"
            fi
          fi

  verify:
    name: Verify Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Install Rust nightly (for docs.rs parity check)
        uses: dtolnay/rust-toolchain@nightly
      
      - name: Install Rust stable (primary toolchain)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.90"
          components: clippy, rustfmt
      
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      
      - name: Check formatting
        run: cargo fmt --all -- --check
      
      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      
      - name: Run tests
        run: cargo test --all-targets --all-features
      
      - name: Build documentation (docs.rs parity)
        env:
          RUSTDOCFLAGS: --cfg docsrs -D warnings
        run: cargo +nightly doc --no-deps --all-features

  publish-macros:
    name: Publish movement-sdk-macros
    runs-on: ubuntu-latest
    needs: [resolve, verify]
    if: needs.resolve.outputs.publish_macros == 'true'
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.90"

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      # --no-verify: The movement-sdk dev-dependency is path-only (dropped from the
      # published crate to break the circular publish dependency), so the
      # verification build would fail. The verify job already runs full tests
      # with workspace path resolution.
      - name: Publish movement-sdk-macros (dry run)
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run == true
        run: cargo publish -p movement-sdk-macros --no-verify --dry-run

      - name: Publish movement-sdk-macros
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.dry_run != true)
        run: cargo publish -p movement-sdk-macros --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  publish-sdk:
    name: Publish movement-sdk
    runs-on: ubuntu-latest
    needs: [resolve, verify, publish-macros]
    # Run if SDK should be published, AND either macros wasn't needed or macros succeeded
    if: |
      always() &&
      needs.resolve.outputs.publish_sdk == 'true' &&
      needs.verify.result == 'success' &&
      (needs.publish-macros.result == 'success' || needs.publish-macros.result == 'skipped')
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.90"

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      # If macros was just published, poll crates.io until it's indexed
      - name: Wait for crates.io to index movement-sdk-macros
        if: needs.publish-macros.result == 'success'
        run: |
          MACROS_VERSION=$(grep '^version' crates/movement-sdk-macros/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "Waiting for movement-sdk-macros ${MACROS_VERSION} to appear on crates.io..."
          for i in $(seq 1 30); do
            if curl -sf -H "User-Agent: aptos-rust-sdk-ci" \
              "https://crates.io/api/v1/crates/movement-sdk-macros/${MACROS_VERSION}" > /dev/null 2>&1; then
              echo "movement-sdk-macros ${MACROS_VERSION} is now available on crates.io"
              sleep 15  # extra buffer for sparse index propagation
              exit 0
            fi
            echo "Attempt ${i}/30: not yet indexed, waiting 10s..."
            sleep 10
          done
          echo "ERROR: Timed out waiting for movement-sdk-macros ${MACROS_VERSION}"
          exit 1

      # When publishing SDK alone, verify the macros dependency is already on crates.io
      - name: Verify movement-sdk-macros dependency is available
        if: needs.publish-macros.result == 'skipped'
        run: |
          MACROS_VERSION=$(grep 'movement-sdk-macros.*version' Cargo.toml | head -1 | sed 's/.*version = "\([^"]*\)".*/\1/')
          echo "Checking that movement-sdk-macros ${MACROS_VERSION} exists on crates.io..."
          if ! curl -sf -H "User-Agent: aptos-rust-sdk-ci" \
            "https://crates.io/api/v1/crates/movement-sdk-macros/${MACROS_VERSION}" > /dev/null 2>&1; then
            echo "ERROR: movement-sdk-macros ${MACROS_VERSION} is not on crates.io."
            echo "Publish the macros crate first (push macros-v${MACROS_VERSION} tag or use 'both')."
            exit 1
          fi
          echo "movement-sdk-macros ${MACROS_VERSION} is available."

      - name: Verify crate can be packaged
        run: cargo package -p movement-sdk --locked

      - name: Publish movement-sdk (dry run)
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run == true
        run: cargo publish -p movement-sdk --locked --dry-run

      - name: Publish movement-sdk
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.dry_run != true)
        run: cargo publish -p movement-sdk --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  release-notes:
    name: Create Release Notes
    runs-on: ubuntu-latest
    needs: [resolve, publish-macros, publish-sdk]
    if: |
      always() &&
      github.event_name == 'push' &&
      (needs.publish-macros.result == 'success' || needs.publish-sdk.result == 'success')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      
      - name: Generate release notes
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
